version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-devstream}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build: ./gateway
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - project-service
      - frontend

  auth-service:
    build: ./auth-service
    environment:
      - DB_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-devstream}
      - JWT_SECRET=${JWT_SECRET:-supersecretjwt}
    depends_on:
      db:
        condition: service_healthy

  project-service:
    build: ./project-service
    environment:
      - DB_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-devstream}
      - JWT_SECRET=${JWT_SECRET:-supersecretjwt}
    depends_on:
      db:
        condition: service_healthy

  metrics-worker:
    build: ./metrics-worker
    environment:
      - DB_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-devstream}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      - VITE_API_URL=http://localhost/api
    ports:
      - "3000:80"

volumes:
  pgdata:
